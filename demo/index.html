<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyFood - Free Food on Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Dancing+Script:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream: #F5F0E8;
            --cream-dark: #EDE6D9;
            --mustard: #D4A534;
            --mustard-dark: #B8912D;
            --charcoal: #2C2C2C;
            --charcoal-light: #4A4A4A;
            --warm-shadow: rgba(180, 140, 80, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(245, 240, 232, 0.9);
            backdrop-filter: blur(10px);
        }

        .header-left {
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--charcoal-light);
        }

        .header-right {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--charcoal);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 30px 60px;
            text-align: center;
        }

        /* Typography Section */
        .hero-text {
            margin-bottom: 50px;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            color: var(--mustard);
            line-height: 1;
        }

        .main-title .line1 {
            font-size: clamp(3.5rem, 12vw, 9rem);
            display: block;
            letter-spacing: -2px;
        }

        .script-overlay {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            color: var(--charcoal);
            margin: 20px 0;
            opacity: 0.85;
        }

        .main-title .line2 {
            font-size: clamp(3.5rem, 12vw, 9rem);
            display: block;
            letter-spacing: -2px;
        }

        .brand-name {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--charcoal-light);
            margin-top: 25px;
        }

        /* Image Gallery */
        .hero-images {
            display: flex;
            gap: 25px;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
            position: relative;
        }

        .image-container {
            position: relative;
        }

        .image-main {
            width: 450px;
            max-width: 50vw;
            height: auto;
            border-radius: 20px;
            box-shadow:
                0 30px 60px var(--warm-shadow),
                0 10px 25px rgba(0,0,0,0.08);
            object-fit: cover;
        }

        .image-secondary {
            width: 280px;
            max-width: 30vw;
            height: auto;
            border-radius: 16px;
            box-shadow:
                0 25px 50px var(--warm-shadow),
                0 8px 20px rgba(0,0,0,0.06);
            object-fit: cover;
        }

        .image-placeholder {
            background: linear-gradient(145deg, var(--cream-dark) 0%, #E8E0D0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .image-main.image-placeholder {
            width: 450px;
            max-width: 50vw;
            aspect-ratio: 4/3;
            border-radius: 20px;
        }

        .image-secondary.image-placeholder {
            width: 280px;
            max-width: 30vw;
            aspect-ratio: 3/4;
            border-radius: 16px;
        }

        /* Eat Now Button */
        .eat-now-btn {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: var(--mustard);
            color: white;
            padding: 20px 40px;
            border-radius: 50px;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow:
                0 20px 50px rgba(212, 165, 52, 0.5),
                0 8px 20px rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10;
            white-space: nowrap;
        }

        .eat-now-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow:
                0 25px 60px rgba(212, 165, 52, 0.6),
                0 10px 25px rgba(0,0,0,0.2);
            background: var(--mustard-dark);
        }

        .eat-now-btn::after {
            content: '→';
            font-size: 1.2rem;
            transition: transform 0.3s;
        }

        .eat-now-btn:hover::after {
            transform: translateX(5px);
        }

        /* Bottom Stats */
        .bottom-stats {
            display: flex;
            gap: 50px;
            margin-top: 50px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--mustard);
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--charcoal-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 5px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .hero-images {
                flex-direction: column;
                gap: 20px;
            }
            .image-main, .image-main.image-placeholder {
                width: 80vw;
                max-width: 400px;
            }
            .image-secondary, .image-secondary.image-placeholder {
                width: 60vw;
                max-width: 250px;
            }
        }

        @media (max-width: 768px) {
            .header { padding: 20px 25px; }
            .hero { padding: 90px 20px 40px; }
            .main-title .line1,
            .main-title .line2 { font-size: 2.8rem; }
            .script-overlay { font-size: 1.4rem; margin: 15px 0; }
            .eat-now-btn { padding: 16px 32px; font-size: 1.1rem; }
            .bottom-stats { gap: 30px; }
            .stat-value { font-size: 1.5rem; }
        }

        @media (max-width: 480px) {
            .main-title .line1,
            .main-title .line2 { font-size: 2rem; }
            .script-overlay { font-size: 1.1rem; }
            .bottom-stats { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">Campus Alerts</div>
        <div class="header-right">OnlyFood</div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-text">
            <h1 class="main-title">
                <span class="line1">FOOD ONLY</span>
            </h1>
            <div class="script-overlay">Powered by Ara, always on campus</div>
            <h1 class="main-title">
                <span class="line2">FREE ONCE</span>
            </h1>
            <div class="brand-name">OnlyFood</div>
        </div>

        <div class="hero-images">
            <div class="image-container">
                <img src="main2.png" alt="Food preview" class="image-secondary"
                     onerror="this.classList.add('image-placeholder'); this.outerHTML='<div class=\'image-secondary image-placeholder\'>🍔</div>';">
            </div>
            <div class="image-container" style="position: relative;">
                <a href="freefood-v2.html" class="eat-now-btn">Eat Now</a>
                <img src="main.jpg" alt="Delicious free campus food" class="image-main"
                     onerror="this.classList.add('image-placeholder'); this.outerHTML='<div class=\'image-main image-placeholder\'>🍕</div>';">
            </div>
        </div>

        <div class="bottom-stats">
            <div class="stat">
                <div class="stat-value">24/7</div>
                <div class="stat-label">Scanning</div>
            </div>
            <div class="stat">
                <div class="stat-value">5+</div>
                <div class="stat-label">Sources</div>
            </div>
            <div class="stat">
                <div class="stat-value">Live</div>
                <div class="stat-label">Alerts</div>
            </div>
        </div>
    </section>
</body>
</html>
