<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyFood - Free Food on Campus</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Dancing+Script:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream: #F5F0E8;
            --cream-dark: #EDE6D9;
            --mustard: #D4A534;
            --mustard-dark: #B8912D;
            --charcoal: #2C2C2C;
            --charcoal-light: #4A4A4A;
            --warm-shadow: rgba(180, 140, 80, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--cream);
            color: var(--charcoal);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(245, 240, 232, 0.85);
            backdrop-filter: blur(15px);
        }

        .header-left {
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--charcoal-light);
        }

        .header-right {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--charcoal);
        }

        /* Hero Section */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 40px 50px;
            text-align: center;
        }

        /* Typography Section */
        .hero-text {
            margin-bottom: 40px;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            color: var(--mustard);
            line-height: 0.95;
            text-shadow: 2px 2px 0 rgba(212, 165, 52, 0.1);
        }

        .main-title .line1 {
            font-size: clamp(4rem, 15vw, 11rem);
            display: block;
            letter-spacing: -3px;
        }

        .script-overlay {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.6rem, 3.5vw, 2.2rem);
            font-weight: 500;
            color: var(--charcoal);
            margin: 15px 0;
            opacity: 0.8;
        }

        .main-title .line2 {
            font-size: clamp(4rem, 15vw, 11rem);
            display: block;
            letter-spacing: -3px;
        }

        .brand-name {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--charcoal-light);
            margin-top: 20px;
        }

        /* Hero Image */
        .hero-image-wrapper {
            position: relative;
            margin-top: 30px;
            width: 100%;
            max-width: 800px;
        }

        .hero-image {
            width: 100%;
            height: auto;
            border-radius: 24px;
            box-shadow:
                0 40px 80px var(--warm-shadow),
                0 15px 35px rgba(0,0,0,0.1);
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .hero-image:hover {
            transform: scale(1.02);
        }

        .image-placeholder {
            width: 100%;
            aspect-ratio: 16/10;
            background: linear-gradient(145deg, var(--cream-dark) 0%, #E8E0D0 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
        }

        /* Eat Now Button - Bottom Left */
        .eat-now-btn {
            position: absolute;
            left: 25px;
            bottom: 25px;
            background: var(--mustard);
            color: white;
            padding: 18px 36px;
            border-radius: 50px;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow:
                0 15px 40px rgba(212, 165, 52, 0.6),
                0 6px 15px rgba(0,0,0,0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
            white-space: nowrap;
        }

        .eat-now-btn:hover {
            transform: scale(1.1) translateY(-3px);
            box-shadow:
                0 20px 50px rgba(212, 165, 52, 0.7),
                0 10px 25px rgba(0,0,0,0.25);
            background: var(--mustard-dark);
        }

        .eat-now-btn::after {
            content: '→';
            font-size: 1.3rem;
            transition: transform 0.3s;
        }

        .eat-now-btn:hover::after {
            transform: translateX(6px);
        }

        /* Subtle animation for button */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 15px 40px rgba(212, 165, 52, 0.6), 0 6px 15px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 18px 50px rgba(212, 165, 52, 0.8), 0 8px 20px rgba(0,0,0,0.25); }
        }

        .eat-now-btn {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .eat-now-btn:hover {
            animation: none;
        }

        /* Bottom Stats */
        .bottom-stats {
            display: flex;
            gap: 60px;
            margin-top: 45px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--mustard);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--charcoal-light);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .hero-image-wrapper {
                max-width: 90vw;
            }
            .eat-now-btn {
                left: 15px;
                bottom: 15px;
                padding: 14px 28px;
                font-size: 1.2rem;
            }
        }

        @media (max-width: 768px) {
            .header { padding: 20px 25px; }
            .hero { padding: 90px 20px 40px; }
            .main-title .line1,
            .main-title .line2 { font-size: 3.2rem; letter-spacing: -1px; }
            .script-overlay { font-size: 1.3rem; margin: 12px 0; }
            .eat-now-btn {
                padding: 14px 28px;
                font-size: 1.1rem;
                left: 12px;
                bottom: 12px;
            }
            .bottom-stats { gap: 35px; }
            .stat-value { font-size: 1.8rem; }
        }

        @media (max-width: 480px) {
            .main-title .line1,
            .main-title .line2 { font-size: 2.4rem; }
            .script-overlay { font-size: 1rem; }
            .bottom-stats { flex-direction: column; gap: 20px; }
            .eat-now-btn {
                padding: 12px 24px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">Campus Alerts</div>
        <div class="header-right">OnlyFood</div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-text">
            <h1 class="main-title">
                <span class="line1">FOOD ONLY</span>
            </h1>
            <div class="script-overlay">Powered by Ara, always on campus</div>
            <h1 class="main-title">
                <span class="line2">FREE ONCE</span>
            </h1>
            <div class="brand-name">OnlyFood</div>
        </div>

        <div class="hero-image-wrapper">
            <a href="freefood-v2.html" class="eat-now-btn">Eat Now</a>
            <img src="main.jpg" alt="Delicious free campus food" class="hero-image"
                 onerror="this.outerHTML='<div class=\'image-placeholder\'>🍕</div>';">
        </div>

        <div class="bottom-stats">
            <div class="stat">
                <div class="stat-value">24/7</div>
                <div class="stat-label">Scanning</div>
            </div>
            <div class="stat">
                <div class="stat-value">5+</div>
                <div class="stat-label">Sources</div>
            </div>
            <div class="stat">
                <div class="stat-value">Live</div>
                <div class="stat-label">Alerts</div>
            </div>
        </div>
    </section>
</body>
</html>
